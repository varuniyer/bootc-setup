name: Build and Sign bootc Image

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-sign:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          push: true
          tags: ghcr.io/varuniyer/bootc-setup:latest

      - uses: sigstore/cosign-installer@v3

      - name: Sign image
        env:
          COSIGN_PASSWORD: ""
        run: |
          echo "${{ secrets.COSIGN_PRIVATE_KEY }}" | base64 -d > cosign.key
          cosign sign --yes --key cosign.key \
            ghcr.io/varuniyer/bootc-setup@${{ steps.build.outputs.digest }}
