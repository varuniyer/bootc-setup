name: Build and Push bootc Image

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'provision.sh'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: podman build -f Containerfile -t ghcr.io/varuniyer/bootc-setup:latest .

      - name: Push image
        run: podman push ghcr.io/varuniyer/bootc-setup:latest

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build disk and publish to GCP
        run: bash build-disk.sh
