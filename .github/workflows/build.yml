name: Build and Sign bootc Image

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-sign:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y podman skopeo jq

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: podman build -f Containerfile -t ghcr.io/varuniyer/bootc-setup:latest .

      - name: Push image
        run: podman push ghcr.io/varuniyer/bootc-setup:latest

      - id: digest
        name: Get image digest
        run: |
          DIGEST=$(skopeo inspect docker://ghcr.io/varuniyer/bootc-setup:latest | jq -r .Digest)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - uses: sigstore/cosign-installer@v3

      - name: Sign image
        env:
          COSIGN_PASSWORD: ""
        run: |
          echo "${{ secrets.COSIGN_PRIVATE_KEY }}" | base64 -d > cosign.key
          cosign sign --yes --key cosign.key \
            ghcr.io/varuniyer/bootc-setup@${{ steps.digest.outputs.digest }}
