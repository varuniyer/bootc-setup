# local socket: peer (OS user must match role name)
local   all             all                                 peer

# tcp: experiments role into experiments db only, from localhost (caddy l4 proxies here)
host    experiments     experiments     127.0.0.1/32        scram-sha-256
host    experiments     experiments     ::1/128             scram-sha-256

# deny everything else
host    all             all             all                 reject
