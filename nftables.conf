#!/usr/sbin/nft -f

flush ruleset

define metadata_ip = 169.254.169.254
define web_ports   = { 80, 443 }

table inet filter {
    # --------
    # Dynamic IPv4 ban set
    # --------
    set abusers {
        type ipv4_addr
        flags timeout
        timeout 10m
    }

    # --------
    # Raw prerouting: must run before conntrack
    # --------
    chain prerouting_raw {
        type filter hook prerouting priority raw; policy accept;

        # IPv6 unsupported
        meta nfproto ipv6 drop

        # Drop banned IPv4 sources as early as possible
        ip saddr @abusers drop

        # Per-source SYN flood protection for IPv4 web ports
        ip protocol tcp tcp dport $web_ports tcp flags & (fin | syn | rst | ack) == syn meter web_syn_rate { ip saddr timeout 10m limit rate over 100/second burst 200 packets } add @abusers { ip saddr } drop
    }

    chain input {
        type filter hook input priority filter; policy drop;

        # Loopback
        iifname "lo" accept

        # IPv6 unsupported
        meta nfproto ipv6 drop

        # Drop known bad IPv4 sources
        ip saddr @abusers drop

        # Established/related traffic
        ct state established,related accept

        # DHCP client traffic
        ip protocol udp udp sport 67 udp dport 68 accept

        # ICMPv4
        ip protocol icmp icmp type {
            destination-unreachable,
            time-exceeded,
            parameter-problem,
            echo-request,
            echo-reply
        } limit rate 10/second accept

        # Drop remaining invalid traffic
        ct state invalid drop

        # --------
        # Per-source concurrent connection caps for IPv4 web ports
        # --------
        ip protocol tcp tcp dport 443 ct state new meter connlimit_443 { ip saddr ct count over 50 } add @abusers { ip saddr } drop

        ip protocol tcp tcp dport 80 ct state new meter connlimit_80 { ip saddr ct count over 30 } add @abusers { ip saddr } drop

        # --------
        # Allow public IPv4 web services only
        # --------
        ip protocol tcp tcp dport $web_ports ct state new accept

        # Logging for final drops
        limit rate 5/second log prefix "nft-drop: " flags all
    }

    chain forward {
        type filter hook forward priority filter; policy drop;
    }

    chain output {
        type filter hook output priority filter; policy drop;

        # Loopback
        oifname "lo" accept

        # IPv6 unsupported
        meta nfproto ipv6 drop

        # Established/related outbound traffic
        ct state established,related accept
        ct state invalid drop

        # DHCP client outbound
        ip protocol udp udp sport 68 udp dport 67 accept

        # DNS over IPv4
        ip protocol udp udp dport 53 accept
        ip protocol tcp tcp dport 53 accept

        # NTP over IPv4
        ip protocol udp udp dport 123 accept

        # GCE metadata service: root only
        ip daddr $metadata_ip tcp dport 80 meta skuid 0 accept
        ip daddr $metadata_ip drop

        # HTTP/HTTPS outbound over IPv4
        ip protocol tcp tcp dport { 80, 443 } accept

        # ICMPv4 outbound
        ip protocol icmp accept
    }
}
