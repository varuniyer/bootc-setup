#!/usr/sbin/nft -f
# Ingress limited to 443/tcp. Egress limited to what the system actually
# needs: ACME (80, 443), registry pulls (443), DNS, NTP, DHCP, ICMP.
# Egress to the GCP metadata server is restricted to root-owned sockets.

table inet firewall {
    chain input {
        type filter hook input priority filter; policy drop;

        iif "lo" accept
        ct state established,related accept
        ct state invalid drop

        meta l4proto { icmp, icmpv6 } accept

        # DHCP client (v4 + v6)
        udp sport 67 udp dport 68 accept
        udp sport 547 udp dport 546 accept

        tcp dport 443 accept
    }

    chain forward {
        type filter hook forward priority filter; policy drop;
    }

    chain output {
        type filter hook output priority filter; policy drop;

        oif "lo" accept
        ct state established,related accept

        ip daddr 169.254.169.254 meta skuid != 0 reject

        meta l4proto { icmp, icmpv6 } accept

        udp dport 53 accept
        tcp dport 53 accept
        udp dport 123 accept

        # DHCP client (v4 + v6)
        udp sport 68 udp dport 67 accept
        udp sport 546 udp dport 547 accept

        tcp dport 80 accept
        tcp dport 443 accept
    }
}
