#!/usr/sbin/nft -f
# Ingress limited to 443/tcp. Egress limited to what the system actually
# needs: ACME + registry pulls (443), DNS, NTP, DHCP, ICMP. DNS is pinned
# to the GCP metadata resolver. Non-DNS egress to that IP is restricted
# to root-owned sockets. Outbound 443 is scoped to root (bootc updates)
# and caddy (ACME via TLS-ALPN-01).

table inet firewall {
    chain input {
        type filter hook input priority filter; policy drop;

        iif "lo" accept
        ct state established,related accept
        ct state invalid drop

        meta l4proto { icmp, icmpv6 } accept

        # DHCP client (v4 + v6)
        udp sport 67 udp dport 68 accept
        udp sport 547 udp dport 546 accept

        tcp dport 443 accept
    }

    chain forward {
        type filter hook forward priority filter; policy drop;
    }

    chain output {
        type filter hook output priority filter; policy drop;

        oif "lo" accept
        ct state established,related accept

        ip daddr 169.254.169.254 udp dport 53 accept
        ip daddr 169.254.169.254 tcp dport 53 accept
        ip daddr 169.254.169.254 meta skuid != 0 reject

        meta l4proto { icmp, icmpv6 } accept

        udp dport 123 accept

        # DHCP client (v4 + v6)
        udp sport 68 udp dport 67 accept
        udp sport 546 udp dport 547 accept

        tcp dport 443 meta skuid { 0, caddy } accept
    }
}
