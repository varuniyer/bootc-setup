#!/usr/sbin/nft -f
# Ingress limited to 443/tcp. Egress limited to what the system actually
# needs: ACME + registry pulls (443), DNS, NTP, DHCP, ICMP. DNS, NTP, and
# DHCP are pinned to the GCP metadata resolver. Non-pinned egress to that
# IP is restricted to root-owned sockets. Outbound 443 is scoped to root
# (bootc updates) and caddy (ACME via TLS-ALPN-01). Loopback to postgres
# on 5432 is scoped to the caddy uid.

table inet firewall {
    chain input {
        type filter hook input priority filter; policy drop;

        iif "lo" accept
        ct state established,related accept
        ct state invalid drop

        meta l4proto { icmp, icmpv6 } accept

        # DHCP client: GCP's DHCP server is the metadata address
        ip saddr 169.254.169.254 udp sport 67 udp dport 68 accept

        tcp dport 443 accept
    }

    chain forward {
        type filter hook forward priority filter; policy drop;
    }

    chain output {
        type filter hook output priority filter; policy drop;

        oif "lo" tcp dport 5432 meta skuid caddy accept
        oif "lo" tcp dport 5432 drop
        oif "lo" accept
        ct state established,related accept

        ip daddr 169.254.169.254 udp dport 53 meta skuid { 0, caddy } accept
        ip daddr 169.254.169.254 tcp dport 53 meta skuid { 0, caddy } accept
        ip daddr 169.254.169.254 udp dport 123 meta skuid chrony accept
        ip daddr 169.254.169.254 tcp dport 80 meta skuid 0 accept
        # DHCP client: broadcast for DISCOVER/REQUEST, unicast for renewal
        ip daddr { 169.254.169.254, 255.255.255.255 } udp sport 68 udp dport 67 accept
        ip daddr 169.254.169.254 meta skuid != 0 reject

        meta l4proto { icmp, icmpv6 } accept

        tcp dport 443 meta skuid { 0, caddy } accept
    }
}
